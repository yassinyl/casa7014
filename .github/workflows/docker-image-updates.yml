name: Docker Image Updates

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pyyaml packaging

      - name: Run updater
        run: |
          python .github/scripts/update_docker_images.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(docker): update docker images"
          title: "Update Docker images"
          body-path: .github/PR_BODY.md
          branch: docker-image-updates
          delete-branch: true
          labels: |
            docker
            updates
